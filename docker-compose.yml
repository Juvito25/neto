# ─────────────────────────────────────────
# NETO — Docker Compose
# SaaS B2B para automatización de WhatsApp con IA
# ─────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: neto_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-neto}
      - DB_USERNAME=${DB_USERNAME:-neto}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
      - QUEUE_CONNECTION=redis
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-neto_evolution_key}
      - EVOLUTION_PUBLIC_URL=${EVOLUTION_PUBLIC_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neto_network

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: neto_worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=60
    volumes:
      - ./backend:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-neto}
      - DB_USERNAME=${DB_USERNAME:-neto}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
      - QUEUE_CONNECTION=redis
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-neto_evolution_key}
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - neto_network

  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: neto_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --no-interaction && sleep 60; done"
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-neto}
      - DB_USERNAME=${DB_USERNAME:-neto}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - neto_network

  nginx:
    image: nginx:1.25-alpine
    container_name: neto_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/certs:/etc/nginx/certs
    depends_on:
      - app
    networks:
      - neto_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: neto_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${APP_URL:-http://localhost}/api
      - VITE_APP_NAME=NETO
    networks:
      - neto_network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: neto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-neto}
      POSTGRES_USER: ${DB_USERNAME:-neto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-neto} -d ${DB_DATABASE:-neto}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - neto_network

  redis:
    image: redis:7.2-alpine
    container_name: neto_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - neto_network

  evolution:
    image: atendai/evolution-api:v1.8.7
    container_name: neto_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    env_file:
      - ./docker/evolution.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - neto_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  evolution_instances:
    driver: local
  evolution_store:
    driver: local

networks:
  neto_network:
    driver: bridge
