server {
    listen 80;
    server_name netoia.cloud www.netoia.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name netoia.cloud www.netoia.cloud;
    
    ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;
    
    root /var/www/neto-landing;
    index index.html;
    
    location /_next/ {
        try_files $uri =404;
    }
    
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }
    
    location / {
        try_files /index.html =404;
    }
}

server {
    listen 80;
    server_name app.netoia.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.netoia.cloud;
    
    ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;
    
    client_max_body_size 20M;
    
    # Frontend (Vue.js)
    location / {
        proxy_pass http://172.18.0.2:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # PHP Backend
    location ~ \.php$ {
        fastcgi_pass 172.18.0.5:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/neto/backend/public/index.php;
        include fastcgi_params;
    }
    
    location /api/ {
        fastcgi_pass 172.18.0.5:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/neto/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        include fastcgi_params;
    }
}