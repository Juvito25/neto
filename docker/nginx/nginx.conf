events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Landing page - netoia.cloud
    server {
        listen 80;
        listen [::]:80;
        server_name netoia.cloud www.netoia.cloud;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name netoia.cloud www.netoia.cloud;

ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;

        root /var/www/neto-landing;
        index index.html;

        location / {
            try_files $uri /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000";
        }
    }

    # App - app.netoia.cloud
    server {
        listen 80;
        listen [::]:80;
        server_name app.netoia.cloud;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name app.netoia.cloud;

        ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;

        client_max_body_size 20M;

        # Frontend (static)
        location / {
            root /var/www/neto/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API (PHP-FPM)
        location /api/ {
            fastcgi_pass neto_app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/neto/backend/public/index.php;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;
            include fastcgi_params;
        }
    }
}