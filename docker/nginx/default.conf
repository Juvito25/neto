    location /api/ {
        alias /var/www/public;
        try_files $uri $uri/ @api;
    }

    location @api {
        rewrite ^/api/(.*)$ /index.php?$query_string last;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
