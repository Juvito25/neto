server {
    listen 80;
    server_name localhost;

    # All frontend requests go to Vite dev server
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_http_version 1.1;
    }

    # API requests go to PHP/Laravel via nginx fastcgi
    location /api/ {
        alias /var/www/public;
        try_files $uri $uri/ @api;
    }

    location @api {
        rewrite ^/api/(.*)$ /index.php?$query_string last;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_read_timeout 60;
    }

    location /storage {
        alias /var/www/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_log  /var/log/nginx/neto_error.log debug;
    access_log  /var/log/nginx/neto_access.log;

    client_max_body_size 10M;
}
