# Landing page - netoia.cloud
server {
    listen 80;
    server_name netoia.cloud www.netoia.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name netoia.cloud www.netoia.cloud;
    ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;
    root /var/www/neto-landing;
    index index.html;
    location / {
        try_files $uri /index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000";
    }
}