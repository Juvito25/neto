server {
    listen 80;
    server_name _;
    root /var/www/neto-landing;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /_next/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    
    error_page 404 /404.html;
}