server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    
    ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;
    
    root /var/www/neto-landing;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /_next/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }
    
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }
    
    error_page 404 /404.html;
}