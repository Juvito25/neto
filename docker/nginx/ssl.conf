server {
    listen 80;
    server_name netoia.cloud www.netoia.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name netoia.cloud www.netoia.cloud;
    ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;
    
    root /var/www/neto-landing;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location /_next/ { expires 30d; add_header Cache-Control "public, no-transform"; }
}

server {
    listen 80;
    server_name app.netoia.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.netoia.cloud;
    ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;
    
    location / { 
        proxy_pass http://127.0.0.1:5173; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_http_version 1.1; 
        proxy_set_header Upgrade $http_upgrade; 
        proxy_set_header Connection "upgrade"; 
    }
    location /api/ { 
        proxy_pass http://127.0.0.1:9000; 
        proxy_set_header Host $host; 
    }
    location /storage/ { 
        proxy_pass http://127.0.0.1:9000; 
    }
}