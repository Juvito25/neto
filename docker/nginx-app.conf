server {
    listen 80;
    listen 443 ssl http2;
    server_name app.netoia.cloud;
    ssl_certificate /etc/letsencrypt/live/netoia.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netoia.cloud/privkey.pem;
    client_max_body_size 20M;

    # Force HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    location / {
        root /var/www/neto/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/neto/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        include fastcgi_params;
    }

    location /webhooks/whatsapp {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/neto/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        include fastcgi_params;
    }
}