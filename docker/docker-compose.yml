version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neto
      POSTGRES_USER: neto
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neto_network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_secret
    networks:
      - neto_network

  app:
    build:
      context: ../backend
      dockerfile: ../docker/app/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: neto
      DB_USERNAME: neto
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: redis_secret
      REDIS_PORT: 6379
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://app.netoia.cloud
      APP_KEY: base64:sGu6Rp8F4kdPpZjIPQVSKnM1zIiOCzxoND1qIlbFS/I=
      PHP_FPM_LISTEN: "9000"
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      PLAN_STARTER_LIMIT: "500"
      PLAN_PRO_LIMIT: "2000"
      PLAN_BUSINESS_LIMIT: "999999"
      TRIAL_DAYS: "7"
    volumes:
      - ../backend:/var/www/neto/backend:ro
      - backend_storage:/var/www/neto/backend/storage
      - backend_cache:/var/www/neto/backend/bootstrap/cache
    networks:
      - neto_network
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: ../backend
      dockerfile: ../docker/app/Dockerfile
    command: schedule:run
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: neto
      DB_USERNAME: neto
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: redis_secret
      APP_ENV: production
      APP_URL: https://app.netoia.cloud
      PHP_FPM_LISTEN: "9000"
    volumes:
      - ../backend:/var/www/neto/backend:ro
      - backend_storage:/var/www/neto/backend/storage
      - backend_cache:/var/www/neto/backend/bootstrap/cache
    networks:
      - neto_network
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/app/Dockerfile
    command: queue:work redis --sleep=3 --tries=3
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: neto
      DB_USERNAME: neto
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: redis_secret
      QUEUE_CONNECTION: redis
      APP_ENV: production
      APP_URL: https://app.netoia.cloud
      PHP_FPM_LISTEN: "9000"
    volumes:
      - ../backend:/var/www/neto/backend:ro
      - backend_storage:/var/www/neto/backend/storage
      - backend_cache:/var/www/neto/backend/bootstrap/cache
    networks:
      - neto_network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../frontend/dist:/var/www/neto/frontend:ro
      - ../landing/out:/var/www/neto-landing:ro
    networks:
      - neto_network
    depends_on:
      - app

  frontend:
    image: nginx:alpine
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
    networks:
      - neto_network
    profiles:
      - dev

  evolution:
    image: evoapicloud/evolution-api:latest
    environment:
      SERVER_URL: http://evolution:8080
      AUTHENTICATION_API_KEY: neto_evolution_key
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - neto_network

networks:
  neto_network:
    driver: bridge

volumes:
  postgres_data:
  evolution_data:
  backend_storage:
  backend_cache: